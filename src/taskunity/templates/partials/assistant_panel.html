<div class="panel-scroll ai-panel-scroll" data-context-title="{{ entity_title }}" data-context-type="{{ context_type }}">
  <div class="panel-heading sticky">
    <div class="task-panel-title-row">
      <button type="button" class="btn-link task-collapse-btn" data-ai-panel-close title="Close AI assistant" aria-label="Close AI assistant">×</button>
      <h2>✦ AI Assistant</h2>
    </div>
  </div>

  {% if ai_cfg.ai_enabled != '1' %}
    <div class="ai-disabled-notice">
      <p>AI assistant is not enabled.</p>
      <p class="muted">Enable and configure it in <strong>⚙ Settings → AI Assistant</strong>.</p>
    </div>
  {% else %}
    <div class="ai-messages" id="ai-messages"></div>

    <div class="ai-input-area">
      <form id="ai-chat-form" class="ai-chat-form"
            hx-post="/ai/chat"
            hx-target="#ai-messages"
            hx-swap="beforeend"
        hx-indicator="#ai-thinking">
        <input type="hidden" name="context_type" value="{{ context_type }}">
        <input type="hidden" name="entity_id" value="{{ entity_id }}">
        <input type="hidden" name="context_json" value="{{ context_json | e }}">
        <input type="hidden" name="extra_context_json" id="ai-extra-context-json" value="[]">
        <input type="hidden" name="history" id="ai-history" value="[]">
        <input type="hidden" name="f_view" value="{{ filters.view }}">
        <input type="hidden" name="f_milestone" value="{{ filters.milestone }}">
        <input type="hidden" name="f_show_closed" value="{% if filters.show_closed %}1{% endif %}">
        <input type="hidden" name="f_stale_days" value="{{ filters.stale_days }}">
        <input type="hidden" id="ai-current-context-kind" value="{{ context_type }}">
        <input type="hidden" id="ai-current-context-id" value="{{ entity_id }}">
        <input type="hidden" id="ai-current-context-label" value="{{ entity_title }}">

        <script type="application/json" id="ai-context-options-json">{{ context_options | tojson }}</script>

        <div class="ai-extra-context" id="ai-extra-context">
          <div class="ai-extra-context-title">Context</div>
          <div id="ai-context-chips" class="ai-context-chips"></div>
          <div class="ai-context-add-wrap">
            <button type="button" class="ai-quick-btn" id="ai-context-add-toggle">+ Add context</button>
            <div id="ai-context-add-controls" class="ai-context-add-controls" hidden>
              <select id="ai-add-kind-select" class="ai-setting-input-sm">
                <option value="task">Task</option>
                <option value="project">Project</option>
                <option value="milestone">Milestone</option>
              </select>
              <select id="ai-add-entity-select" class="ai-setting-input-sm">
                <option value="">Select context…</option>
              </select>
              <button type="button" class="ai-quick-btn" id="ai-context-add-confirm">Add</button>
            </div>
          </div>
        </div>

        <div class="ai-textarea-row">
          <textarea
            name="user_message"
            class="ai-textarea"
            placeholder="{% if context_type %}Ask about this {{ context_type }}…{% else %}Ask AI…{% endif %}"
            rows="3"
            required
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();this.closest('form').requestSubmit();}"
          ></textarea>
          <button type="submit" class="ai-send-btn" title="Send">→</button>
        </div>
      </form>

      <div id="ai-thinking" class="ai-thinking htmx-indicator">
        <span class="ai-thinking-dot"></span>
        <span class="ai-thinking-dot"></span>
        <span class="ai-thinking-dot"></span>
      </div>
    </div>
  {% endif %}
</div>
<script>
(function () {
  var hidden = document.getElementById('ai-extra-context-json');
  var chipsRoot = document.getElementById('ai-context-chips');
  var optionsJson = document.getElementById('ai-context-options-json');
  var currentKindEl = document.getElementById('ai-current-context-kind');
  var currentIdEl = document.getElementById('ai-current-context-id');
  var currentLabelEl = document.getElementById('ai-current-context-label');
  var addToggle = document.getElementById('ai-context-add-toggle');
  var addControls = document.getElementById('ai-context-add-controls');
  var kindSelect = document.getElementById('ai-add-kind-select');
  var entitySelect = document.getElementById('ai-add-entity-select');
  var addConfirm = document.getElementById('ai-context-add-confirm');
  var form = document.getElementById('ai-chat-form');
  var contextTypeInput = form ? form.querySelector('[name="context_type"]') : null;
  var entityIdInput = form ? form.querySelector('[name="entity_id"]') : null;
  var contextJsonInput = form ? form.querySelector('[name="context_json"]') : null;
  if (!hidden || !chipsRoot || !optionsJson || !kindSelect || !entitySelect || !addToggle || !addControls || !addConfirm || !form) return;

  function getContextOptions() {
    try {
      var parsed = JSON.parse(optionsJson.textContent || '{}');
      return parsed && typeof parsed === 'object' ? parsed : {};
    } catch (_) {
      return {};
    }
  }

  function getCurrentContext() {
    var kind = (currentKindEl && currentKindEl.value) || '';
    var id = (currentIdEl && currentIdEl.value) || '';
    var label = (currentLabelEl && currentLabelEl.value) || '';
    if (!id && !label) return null;
    return {
      kind: kind,
      id: id,
      label: label,
      fixed: true
    };
  }

  function parseList() {
    try {
      var parsed = JSON.parse(hidden.value || '[]');
      return Array.isArray(parsed) ? parsed : [];
    } catch (_) {
      return [];
    }
  }
  function saveList(list) {
    hidden.value = JSON.stringify(list || []);
    render();
  }
  function render() {
    var list = parseList();
    var current = getCurrentContext();
    var merged = (current ? [current] : []).concat(list || []);
    chipsRoot.innerHTML = '';
    merged.forEach(function (item, index) {
      var chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'ai-context-chip';
      if (item.fixed) chip.setAttribute('data-remove-current', '1');
      else chip.setAttribute('data-remove-index', String(index - 1));
      var label = (item.kind || 'context') + ': ' + (item.label || item.id || '');
      chip.setAttribute('aria-label', 'Remove ' + label + ' context');
      chip.innerHTML = '<span class="ai-context-chip-text"></span><span class="ai-context-chip-x" aria-hidden="true">×</span>';
      chip.querySelector('.ai-context-chip-text').textContent = label;
      chipsRoot.appendChild(chip);
    });
  }

  function repopulateEntitySelect() {
    var opts = getContextOptions();
    var kind = (kindSelect.value || 'task') + 's';
    var rows = Array.isArray(opts[kind]) ? opts[kind] : [];
    entitySelect.innerHTML = '<option value="">Select context…</option>';
    rows.forEach(function (row) {
      var opt = document.createElement('option');
      opt.value = row.id;
      opt.textContent = row.label || row.id;
      entitySelect.appendChild(opt);
    });
  }

  function addSelectedContext() {
    if (!entitySelect.value) return;
    var kind = kindSelect.value || 'task';
    var id = entitySelect.value;
    var label = entitySelect.options[entitySelect.selectedIndex] ? entitySelect.options[entitySelect.selectedIndex].textContent : id;
    var list = parseList();
    var current = getCurrentContext();
    if (current && current.kind === kind && current.id === id) {
      entitySelect.value = '';
      return;
    }
    var exists = list.some(function (x) { return x.kind === kind && x.id === id; });
    if (!exists) {
      list.push({ kind: kind, id: id, label: (label || '').trim() });
      saveList(list);
    }
    entitySelect.value = '';
  }

  repopulateEntitySelect();
  render();

  if (window.taskunityAiRenderContextChips) {
    window.taskunityAiRenderContextChips();
  }

  window.taskunityAiRenderContextChips = function () {
    repopulateEntitySelect();
    render();
  };

  kindSelect.addEventListener('change', repopulateEntitySelect);
  addToggle.addEventListener('click', function () {
    addControls.hidden = !addControls.hidden;
    if (!addControls.hidden) repopulateEntitySelect();
  });
  addConfirm.addEventListener('click', addSelectedContext);

  document.addEventListener('click', function (e) {
    var currentRm = e.target.closest('[data-remove-current]');
    if (currentRm) {
      if (currentKindEl) currentKindEl.value = '';
      if (currentIdEl) currentIdEl.value = '';
      if (currentLabelEl) currentLabelEl.value = '';
      if (contextTypeInput) contextTypeInput.value = '';
      if (entityIdInput) entityIdInput.value = '';
      if (contextJsonInput) contextJsonInput.value = '';
      render();
      return;
    }
    var rm = e.target.closest('[data-remove-index]');
    if (!rm) return;
    var idx = parseInt(rm.getAttribute('data-remove-index') || '-1', 10);
    if (idx < 0) return;
    var list = parseList();
    list.splice(idx, 1);
    saveList(list);
  });
})();
</script>

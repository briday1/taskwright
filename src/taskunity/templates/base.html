<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }} · {{ workspace_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/chart.umd.min.js"></script>
  <script src="/static/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">{{ app_name[:1]|upper }}</span>
      <div>
        <h1>{{ app_name }}</h1>
        <p>{{ workspace_name }}</p>
      </div>
    </div>
    <div class="settings-anchor">
      <button class="settings-btn" id="settings-btn" aria-label="Settings" title="Settings">⚙</button>
      <div class="settings-popup" id="settings-popup" hidden>
        <div class="settings-popup-title">Theme</div>
        <div class="theme-options">
          <button class="theme-option" data-theme-opt="system" title="Follow system preference">
            <span>💻</span>System
          </button>
          <button class="theme-option" data-theme-opt="light" title="Light mode">
            <span>☀️</span>Light
          </button>
          <button class="theme-option" data-theme-opt="dark" title="Dark mode">
            <span>🌙</span>Dark
          </button>
        </div>

      <div class="settings-popup-title settings-section-sep">AI Assistant</div>
      <form id="ai-settings-form"
            hx-post="/settings/save"
            hx-target="#ai-settings-status"
            hx-swap="outerHTML">
        <div class="ai-settings-grid">
          <label class="ai-setting-row ai-setting-row-toggle">
            <span class="ai-setting-label">Enable AI</span>
            <input type="checkbox" name="ai_enabled" id="ai-enabled-cb" value="1"
                   {% if ai_enabled %}checked{% endif %}
                   onchange="document.getElementById('ai-settings-fields').style.display=this.checked?'':'none'">
          </label>
          <div id="ai-settings-fields" {% if not ai_enabled %}style="display:none"{% endif %}>
            <label class="ai-setting-row">
              <span class="ai-setting-label">Base URL</span>
              <input type="url" name="ai_base_url" value="{{ ai_base_url }}" placeholder="https://your-endpoint.example.com" class="ai-setting-input">
            </label>
            <label class="ai-setting-row">
              <span class="ai-setting-label">API Key</span>
              <input type="password" name="ai_api_key" value="{{ ai_api_key }}" placeholder="••••••••" class="ai-setting-input" autocomplete="off">
            </label>
            <label class="ai-setting-row">
              <span class="ai-setting-label">Model</span>
              <div class="ai-model-row">
                <input type="text" name="ai_model" id="ai-model-input" value="{{ ai_model }}" placeholder="e.g. gpt-4" class="ai-setting-input" list="ai-model-datalist">
                <button type="button" class="ai-load-models-btn" id="ai-load-models-btn" title="Load available models from endpoint">↻</button>
              </div>
              <select id="ai-model-select" class="ai-setting-input ai-model-select">
                <option value="">Select discovered model...</option>
              </select>
              <datalist id="ai-model-datalist"></datalist>
            </label>
            <div class="ai-settings-row-grid2">
              <label>
                <span class="ai-setting-label">Chat Path (optional)</span>
                <input type="text" name="ai_chat_path" value="{{ ai_chat_path }}" placeholder="/chat/completions" class="ai-setting-input-sm">
              </label>
              <label>
                <span class="ai-setting-label">Models Path (optional)</span>
                <input type="text" name="ai_models_path" value="{{ ai_models_path }}" placeholder="/models" class="ai-setting-input-sm">
              </label>
            </div>
            <div class="ai-setting-row ai-settings-row-grid3">
              <label>
                <span class="ai-setting-label">Timeout (s)</span>
                <input type="number" name="ai_timeout_seconds" value="{{ ai_timeout_seconds }}" min="5" max="120" class="ai-setting-input-sm">
              </label>
              <label>
                <span class="ai-setting-label">Max tokens</span>
                <input type="number" name="ai_max_tokens" value="{{ ai_max_tokens }}" min="64" max="8192" class="ai-setting-input-sm">
              </label>
              <label>
                <span class="ai-setting-label">Temperature</span>
                <input type="number" name="ai_temperature" value="{{ ai_temperature }}" min="0" max="2" step="0.1" class="ai-setting-input-sm">
              </label>
            </div>
          </div>
        </div>
        <div class="ai-settings-actions">
          <button type="button" class="ai-load-models-btn" id="ai-test-connection-btn">Test connection</button>
          <div id="ai-connection-status" class="ai-settings-status-inline"></div>
        </div>
        <div class="ai-settings-actions">
          <button type="submit" class="ai-settings-save-btn">Save AI settings</button>
          <div id="ai-settings-status" class="ai-settings-status-inline"></div>
        </div>
      </form>
    </div>
    </div>
  </header>
  {% block body %}{% endblock %}
  <script>
    (function () {
      // --- App-wide localStorage key constants ---
      var THEME_KEY = 'taskunity.theme';
      var PANE_KEY = 'taskunity.sidePaneWidth';
      var AI_PANE_KEY = 'taskunity.aiPaneWidth';

      // --- Theme ---
      (function () {
        function applyTheme(theme) {
          if (theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
          } else if (theme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          } else {
            document.documentElement.removeAttribute('data-theme');
          }
          document.querySelectorAll('.theme-option').forEach(function (btn) {
            btn.classList.toggle('active', btn.dataset.themeOpt === (theme || 'system'));
          });
        }
        var saved = localStorage.getItem(THEME_KEY) || 'system';
        applyTheme(saved);
        document.addEventListener('click', function (e) {
          var opt = e.target.closest('[data-theme-opt]');
          if (opt) {
            var t = opt.dataset.themeOpt;
            localStorage.setItem(THEME_KEY, t);
            applyTheme(t);
            return;
          }
          var btn = e.target.closest('#settings-btn');
          if (btn) {
            var popup = document.getElementById('settings-popup');
            if (popup) popup.hidden = !popup.hidden;
            if (popup && !popup.hidden) {
              var saved2 = localStorage.getItem(THEME_KEY) || 'system';
              document.querySelectorAll('.theme-option').forEach(function (b) {
                b.classList.toggle('active', b.dataset.themeOpt === saved2);
              });
            }
            return;
          }
          var popup2 = document.getElementById('settings-popup');
          if (popup2 && !e.target.closest('.settings-anchor')) popup2.hidden = true;
        });
      })();

      (function () {
        function aiBuildParams() {
          var form = document.getElementById('ai-settings-form');
          if (!form) return '';
          var params = new URLSearchParams();
          var formData = new FormData(form);
          formData.forEach(function (value, key) {
            if (typeof value === 'string') params.append(key, value);
          });
          if (!formData.has('ai_enabled')) params.set('ai_enabled', '0');
          return params.toString();
        }

        function aiSetStatus(id, cls, text) {
          var el = document.getElementById(id);
          if (!el) return;
          el.className = cls || 'ai-settings-status-inline';
          el.textContent = text || '';
        }

        async function aiLoadModels() {
          aiSetStatus('ai-connection-status', 'ai-settings-status-inline', 'Loading models...');
          var params = aiBuildParams();
          var response = await fetch('/ai/models' + (params ? '?' + params : ''));
          var optionsHtml = await response.text();
          var datalist = document.getElementById('ai-model-datalist');
          var select = document.getElementById('ai-model-select');
          if (datalist) datalist.innerHTML = optionsHtml;
          if (select) {
            select.innerHTML = '<option value="">Select discovered model...</option>' + optionsHtml;
          }
          var optionCount = 0;
          if (select) {
            optionCount = Array.prototype.filter.call(select.options, function (opt) {
              return !!(opt.value || '').trim();
            }).length;
          }
          if (optionCount > 0) {
            aiSetStatus('ai-connection-status', 'ai-save-ok', 'Loaded ' + optionCount + ' models.');
          } else {
            aiSetStatus('ai-connection-status', 'ai-save-err', 'No models loaded. Check endpoint settings.');
          }
        }

        async function aiTestConnection() {
          aiSetStatus('ai-connection-status', 'ai-settings-status-inline', 'Testing connection...');
          var params = aiBuildParams();
          var response = await fetch('/ai/test' + (params ? '?' + params : ''));
          var html = await response.text();
          var wrapper = document.createElement('div');
          wrapper.innerHTML = html;
          var status = wrapper.querySelector('#ai-connection-status');
          if (status) {
            aiSetStatus('ai-connection-status', status.className || 'ai-settings-status-inline', status.textContent || '');
          } else {
            aiSetStatus('ai-connection-status', 'ai-save-err', 'Test failed.');
          }
        }

        document.addEventListener('click', function (e) {
          var loadBtn = e.target.closest('#ai-load-models-btn');
          if (loadBtn) {
            e.preventDefault();
            aiLoadModels();
            return;
          }
          var testBtn = e.target.closest('#ai-test-connection-btn');
          if (testBtn) {
            e.preventDefault();
            aiTestConnection();
          }
        });

        document.addEventListener('change', function (e) {
          if (!(e.target && e.target.id === 'ai-model-select')) return;
          var modelInput = document.getElementById('ai-model-input');
          if (modelInput && e.target.value) modelInput.value = e.target.value;
        });
      })();

      function setProject(picker, value, color, label) {
        var hidden = picker.querySelector('input[name="project"]');
        var current = picker.querySelector('.project-dd-current');
        if (hidden) hidden.value = value;
        var shown = (label || value || '').trim();
        if (current) {
          if (color) {
            current.innerHTML = '<span class="swatch" style="background:' + color + '"></span>';
            current.appendChild(document.createTextNode(shown));
          } else {
            current.textContent = shown;
          }
        }
        picker.querySelectorAll('.project-dd-item').forEach(function (b) {
          b.classList.toggle('selected', b.dataset.value === value);
        });
        var dd = picker.querySelector('details');
        if (dd) dd.open = false;
      }
      document.addEventListener('click', function (e) {
        var item = e.target.closest('.project-dd-item');
        if (item) {
          var picker = item.closest('[data-project-picker]');
          if (picker) setProject(picker, item.dataset.value, item.dataset.color, item.dataset.label || item.textContent);
          return;
        }
        document.querySelectorAll('.project-dd[open]').forEach(function (dd) {
          if (!dd.contains(e.target)) dd.open = false;
        });
      });
      document.addEventListener('keydown', function (e) {
        if (e.target.classList && e.target.classList.contains('project-dd-input') && e.key === 'Enter') {
          e.preventDefault();
          var val = e.target.value.trim();
          if (!val) return;
          var picker = e.target.closest('[data-project-picker]');
          if (picker) setProject(picker, val, '', val);
        }
      });

      function depRefresh(picker) {
        var hidden = picker.querySelector('input[name="depends_on"]');
        var ids = Array.prototype.map.call(picker.querySelectorAll('.dep-chip'), function (c) { return c.dataset.id; });
        if (hidden) hidden.value = ids.join(', ');
      }
      function depFilter(picker) {
        var input = picker.querySelector('.dep-search-input');
        var menu = picker.querySelector('.dep-menu');
        var empty = picker.querySelector('.dep-empty');
        var q = (input.value || '').trim().toLowerCase();
        if (q === '') { menu.hidden = true; if (empty) empty.hidden = true; return; }
        var shown = 0;
        picker.querySelectorAll('.dep-option').forEach(function (o) {
          var already = !!picker.querySelector('.dep-chip[data-id="' + o.dataset.id + '"]');
          var match = o.dataset.search.indexOf(q) !== -1;
          var show = match && !already;
          o.hidden = !show;
          if (show) shown++;
        });
        if (empty) empty.hidden = shown !== 0;
        menu.hidden = false;
      }
      function depAdd(picker, id, title) {
        if (picker.querySelector('.dep-chip[data-id="' + id + '"]')) return;
        var chips = picker.querySelector('.dep-chips');
        var chip = document.createElement('span');
        chip.className = 'dep-chip';
        chip.dataset.id = id;
        chip.appendChild(document.createTextNode(title));
        var x = document.createElement('button');
        x.type = 'button';
        x.className = 'dep-chip-x';
        x.setAttribute('data-dep-remove', '');
        x.setAttribute('aria-label', 'Remove dependency');
        x.textContent = '×';
        chip.appendChild(x);
        chips.appendChild(chip);
        depRefresh(picker);
        var input = picker.querySelector('.dep-search-input');
        if (input) input.value = '';
        var menu = picker.querySelector('.dep-menu');
        if (menu) menu.hidden = true;
      }
      document.addEventListener('input', function (e) {
        if (e.target.classList && e.target.classList.contains('dep-search-input')) {
          var picker = e.target.closest('[data-dep-picker]');
          if (picker) depFilter(picker);
        }
      });
      document.addEventListener('focusin', function (e) {
        if (e.target.classList && e.target.classList.contains('dep-search-input')) {
          var picker = e.target.closest('[data-dep-picker]');
          if (picker) depFilter(picker);
        }
      });
      document.addEventListener('click', function (e) {
        var opt = e.target.closest('.dep-option');
        if (opt) {
          var picker = opt.closest('[data-dep-picker]');
          var titleEl = opt.querySelector('.dep-option-title');
          if (picker) depAdd(picker, opt.dataset.id, titleEl ? titleEl.textContent : opt.dataset.id);
          return;
        }
        var rm = e.target.closest('[data-dep-remove]');
        if (rm) {
          var picker2 = rm.closest('[data-dep-picker]');
          var chip = rm.closest('.dep-chip');
          if (chip) chip.remove();
          if (picker2) depRefresh(picker2);
          return;
        }
        document.querySelectorAll('[data-dep-picker]').forEach(function (p) {
          if (!p.contains(e.target)) {
            var m = p.querySelector('.dep-menu');
            if (m) m.hidden = true;
          }
        });
      });

      function msAddFilter(box) {
        var input = box.querySelector('.ms-add-input');
        var menu = box.querySelector('.ms-add-menu');
        var empty = box.querySelector('.dep-empty');
        var q = (input.value || '').trim().toLowerCase();
        var shown = 0;
        box.querySelectorAll('.ms-add-option').forEach(function (o) {
          var match = q === '' ? true : o.dataset.search.indexOf(q) !== -1;
          o.hidden = !match;
          if (match) shown++;
        });
        if (empty) empty.hidden = shown !== 0;
        if (menu) menu.hidden = false;
      }
      document.addEventListener('input', function (e) {
        if (e.target.classList && e.target.classList.contains('ms-add-input')) {
          var box = e.target.closest('[data-ms-add]');
          if (box) msAddFilter(box);
        }
      });
      document.addEventListener('focusin', function (e) {
        if (e.target.classList && e.target.classList.contains('ms-add-input')) {
          var box = e.target.closest('[data-ms-add]');
          if (box) msAddFilter(box);
        }
      });
      document.addEventListener('click', function (e) {
        if (e.target.closest('.ms-add-option')) return;
        document.querySelectorAll('[data-ms-add]').forEach(function (box) {
          if (!box.contains(e.target)) {
            var m = box.querySelector('.ms-add-menu');
            if (m) m.hidden = true;
          }
        });
      });

      // Milestone project chips: add via select, remove via x
      document.addEventListener('change', function (e) {
        if (!(e.target.classList && e.target.classList.contains('ms-proj-select'))) return;
        var sel = e.target;
        var name = sel.value;
        if (!name) return;
        var box = sel.closest('[data-ms-projects]');
        if (!box) return;
        var chips = box.querySelector('.ms-proj-chips');
        if (chips.querySelector('.ms-proj-chip[data-name="' + name + '"]')) { sel.value = ''; return; }
        var color = sel.options[sel.selectedIndex].dataset.color || '#2e6fd8';
        var chip = document.createElement('span');
        chip.className = 'ms-proj-chip';
        chip.dataset.name = name;
        var sw = document.createElement('span');
        sw.className = 'swatch';
        sw.style.background = color;
        chip.appendChild(sw);
        chip.appendChild(document.createTextNode(name));
        var hid = document.createElement('input');
        hid.type = 'hidden';
        hid.name = 'projects';
        hid.value = name;
        chip.appendChild(hid);
        var x = document.createElement('button');
        x.type = 'button';
        x.className = 'ms-proj-x';
        x.setAttribute('data-ms-proj-remove', '');
        x.setAttribute('aria-label', 'Remove project');
        x.textContent = '×';
        chip.appendChild(x);
        chips.appendChild(chip);
        sel.remove(sel.selectedIndex);
        sel.value = '';
      });
      document.addEventListener('click', function (e) {
        var pr = e.target.closest('[data-ms-proj-remove]');
        if (!pr) return;
        var chip = pr.closest('.ms-proj-chip');
        var box = pr.closest('[data-ms-projects]');
        if (!chip || !box) return;
        var name = chip.dataset.name;
        var sel = box.querySelector('.ms-proj-select');
        chip.remove();
        if (sel && !Array.prototype.some.call(sel.options, function (o) { return o.value === name; })) {
          var o = document.createElement('option');
          o.value = name;
          o.textContent = name;
          sel.appendChild(o);
        }
      });

      function removeDraftFields(form) {
        if (!form) return;
        form.querySelectorAll('input[data-draft-field="1"]').forEach(function (el) { el.remove(); });
      }
      function appendDraftField(form, name, value) {
        var input = document.createElement('input');
        input.type = 'hidden';
        input.name = name;
        input.value = value == null ? '' : String(value);
        input.setAttribute('data-draft-field', '1');
        form.appendChild(input);
      }
      function copyNamedValue(sourceForm, targetForm, sourceName, targetName) {
        if (!sourceForm || !targetForm) return;
        var field = sourceForm.querySelector('[name="' + sourceName + '"]');
        if (!field) return;
        appendDraftField(targetForm, targetName || sourceName, field.value || '');
      }
      function copyNamedValues(sourceForm, targetForm, sourceName, targetName) {
        if (!sourceForm || !targetForm) return;
        sourceForm.querySelectorAll('[name="' + sourceName + '"]').forEach(function (field) {
          appendDraftField(targetForm, targetName || sourceName, field.value || '');
        });
      }
      function applyTaskDraftToActionForm(actionForm) {
        var scope = actionForm.closest('.panel-scroll') || document;
        var sourceForm = scope.querySelector('form[data-task-edit-form]');
        if (!sourceForm) return;
        removeDraftFields(actionForm);
        copyNamedValue(sourceForm, actionForm, 'title', 'save_title');
        copyNamedValue(sourceForm, actionForm, 'project', 'save_project');
        copyNamedValue(sourceForm, actionForm, 'summary', 'save_summary');
        copyNamedValue(sourceForm, actionForm, 'description', 'save_task_description');
        copyNamedValue(sourceForm, actionForm, 'tags', 'save_tags');
        copyNamedValue(sourceForm, actionForm, 'start_date', 'save_start_date');
        copyNamedValue(sourceForm, actionForm, 'due_date', 'save_due_date');
        copyNamedValue(sourceForm, actionForm, 'completed_date', 'save_completed_date');
        copyNamedValue(sourceForm, actionForm, 'depends_on', 'save_depends_on');
      }
      function applyMilestoneDraftToActionForm(actionForm) {
        var scope = actionForm.closest('.panel-scroll') || document;
        var sourceForm = scope.querySelector('form[data-milestone-edit-form]');
        if (!sourceForm) return;
        removeDraftFields(actionForm);
        copyNamedValue(sourceForm, actionForm, 'title', 'save_title');
        copyNamedValue(sourceForm, actionForm, 'status', 'save_status');
        copyNamedValue(sourceForm, actionForm, 'color', 'save_color');
        copyNamedValue(sourceForm, actionForm, 'summary', 'save_summary');
        copyNamedValue(sourceForm, actionForm, 'description', 'save_description');
        copyNamedValue(sourceForm, actionForm, 'start_date', 'save_start_date');
        copyNamedValue(sourceForm, actionForm, 'target_date', 'save_target_date');
        appendDraftField(actionForm, 'save_projects_present', '1');
        copyNamedValues(sourceForm, actionForm, 'projects', 'save_projects');
      }
      document.body.addEventListener('htmx:beforeRequest', function (e) {
        var form = e && e.detail ? e.detail.elt : null;
        if (!form || !form.matches || !form.matches('form[data-save-draft-from]')) return;
        var mode = form.getAttribute('data-save-draft-from');
        if (mode === 'task') applyTaskDraftToActionForm(form);
        if (mode === 'milestone') applyMilestoneDraftToActionForm(form);
      });

      function setComposerTab(root, name) {
        if (!root) return;
        root.querySelectorAll('[data-activity-tab]').forEach(function (btn) {
          btn.classList.toggle('active', btn.dataset.activityTab === name);
        });
        root.querySelectorAll('[data-activity-pane]').forEach(function (pane) {
          pane.hidden = pane.dataset.activityPane !== name;
        });
      }
      document.addEventListener('click', function (e) {
        var tab = e.target.closest('[data-activity-tab]');
        if (!tab) return;
        var root = tab.closest('[data-activity-composer]');
        if (root) setComposerTab(root, tab.dataset.activityTab);
      });
      document.querySelectorAll('[data-activity-composer]').forEach(function (root) {
        setComposerTab(root, 'note');
      });
      document.body.addEventListener('htmx:afterSwap', function () {
        document.querySelectorAll('[data-activity-composer]').forEach(function (root) {
          var active = root.querySelector('[data-activity-tab].active');
          setComposerTab(root, active ? active.dataset.activityTab : 'note');
        });
      });

      function getMainLayout() {
        return document.getElementById('app-main');
      }
      function collapseTaskPanel() {
        var main = getMainLayout();
        if (!main) return;
        main.classList.add('panel-collapsed');
      }
      function expandTaskPanel() {
        var main = getMainLayout();
        if (!main) return;
        main.classList.remove('panel-collapsed');
      }
      function panelHasContent(panel) {
        if (!panel) return false;
        return !!panel.children.length && (panel.textContent || '').trim().length > 0;
      }
      var lastTaskPanelUrl = '';
      var lastTaskPanelRequestedAt = 0;
      document.addEventListener('click', function (e) {
        var btn = e.target.closest('[data-panel-collapse]');
        if (!btn) return;
        collapseTaskPanel();
      });
      document.addEventListener('click', function (e) {
        var panelTrigger = e.target.closest('[hx-target="#task-panel"]');
        if (!panelTrigger) return;
        expandTaskPanel();
        var panelUrl = panelTrigger.getAttribute('hx-get') || '';
        if (/\/tasks\/[^/]+\/panel(?:\?|$)/.test(panelUrl)) {
          lastTaskPanelUrl = panelUrl;
          lastTaskPanelRequestedAt = Date.now();
          window.setTimeout(function () {
            var panel = document.getElementById('task-panel');
            if (!panel) return;
            if (panelHasContent(panel)) return;
            if (!window.htmx || typeof window.htmx.ajax !== 'function') return;
            window.htmx.ajax('GET', panelUrl, { target: '#task-panel', swap: 'innerHTML' });
          }, 220);
        }
      });
      document.addEventListener('pointerdown', function (e) {
        var panelTrigger = e.target.closest('[hx-target="#task-panel"]');
        if (!panelTrigger) return;
        expandTaskPanel();
      }, true);
      document.body.addEventListener('htmx:beforeRequest', function (e) {
        var trigger = e && e.detail ? e.detail.elt : null;
        if (!trigger) return;
        var source = trigger.closest ? trigger.closest('[hx-target="#task-panel"]') : null;
        var panelTarget = (source && source.getAttribute ? source.getAttribute('hx-target') : null) || (trigger.getAttribute && trigger.getAttribute('hx-target'));
        if (panelTarget === '#task-panel' || source) {
          expandTaskPanel();
        }
        if (panelTarget === '#task-panel') {
          var panelUrl = ((source && source.getAttribute && source.getAttribute('hx-get')) || (trigger.getAttribute && trigger.getAttribute('hx-get')) || '');
          if (/\/tasks\/[^/]+\/panel(?:\?|$)/.test(panelUrl)) {
            lastTaskPanelUrl = panelUrl;
            lastTaskPanelRequestedAt = Date.now();
          }
        }
      });
      document.body.addEventListener('htmx:beforeSwap', function (e) {
        var target = e && e.detail ? e.detail.target : null;
        if (!target) return;
        var panel = target.id === 'task-panel' ? target : target.closest ? target.closest('#task-panel') : null;
        if (!panel) return;
        expandTaskPanel();
        var xhr = e.detail && e.detail.xhr ? e.detail.xhr : null;
        var incoming = xhr && typeof xhr.responseText === 'string' ? xhr.responseText.trim() : null;
        if (incoming === '') {
          e.detail.shouldSwap = false;
          if (lastTaskPanelUrl && window.htmx && typeof window.htmx.ajax === 'function') {
            window.setTimeout(function () {
              window.htmx.ajax('GET', lastTaskPanelUrl, { target: '#task-panel', swap: 'innerHTML' });
            }, 40);
          }
        }
      });
      document.body.addEventListener('htmx:afterSwap', function (e) {
        var target = e && e.detail ? e.detail.target : null;
        if (!target) return;
        var panel = target.id === 'task-panel' ? target : target.closest ? target.closest('#task-panel') : null;
        if (!panel) return;
        var hasContent = panelHasContent(panel);
        if (hasContent) {
          expandTaskPanel();
          lastTaskPanelRequestedAt = Date.now();
        }
      });
      document.body.addEventListener('htmx:afterSwap', function (e) {
        var target = e && e.detail ? e.detail.target : null;
        if (!target || target.id !== 'app-main') return;
        if (!lastTaskPanelUrl) return;
        var panel = document.getElementById('task-panel');
        if (!panel) return;
        var recentlyRequested = (Date.now() - lastTaskPanelRequestedAt) < 4500;
        if (!recentlyRequested) return;
        var hasContent = panelHasContent(panel);
        if (hasContent) return;
        expandTaskPanel();
        if (window.htmx && typeof window.htmx.ajax === 'function') {
          window.htmx.ajax('GET', lastTaskPanelUrl, { target: '#task-panel', swap: 'innerHTML' });
        }
      });

      function paneBounds() {
        var max = Math.min(Math.floor(window.innerWidth * 0.62), 820);
        var min = 300;
        if (max < min) max = min;
        return { min: min, max: max };
      }
      function aiPaneBounds() {
        var max = Math.min(Math.floor(window.innerWidth * 0.54), 760);
        var min = 300;
        if (max < min) max = min;
        return { min: min, max: max };
      }
      function resizeTaskunityCharts() {
        if (!window.taskunityCharts) return;
        Object.keys(window.taskunityCharts).forEach(function (key) {
          var chart = window.taskunityCharts[key];
          if (!chart || typeof chart.resize !== 'function') return;
          chart.resize();
          if (typeof chart.update === 'function') chart.update('none');
        });
      }
      var chartResizeRaf = 0;
      function scheduleChartResize() {
        if (chartResizeRaf) cancelAnimationFrame(chartResizeRaf);
        chartResizeRaf = requestAnimationFrame(function () {
          chartResizeRaf = 0;
          resizeTaskunityCharts();
        });
      }
      var chartResizeObserver = null;
      function initChartResizeObserver(root) {
        if (typeof ResizeObserver === 'undefined') return;
        if (!chartResizeObserver) {
          chartResizeObserver = new ResizeObserver(function () {
            scheduleChartResize();
          });
        }
        var scope = root || document;
        var targets = [
          scope.getElementById ? scope.getElementById('app-main') : document.getElementById('app-main'),
          scope.getElementById ? scope.getElementById('task-panel') : document.getElementById('task-panel')
        ];
        targets.forEach(function (el) {
          if (!el || el.dataset.chartResizeObserved === '1') return;
          chartResizeObserver.observe(el);
          el.dataset.chartResizeObserved = '1';
        });
      }
      function setPaneWidth(layout, px) {
        if (!layout) return;
        var b = paneBounds();
        var clamped = Math.max(b.min, Math.min(b.max, Math.round(px)));
        layout.style.setProperty('--side-pane-width', clamped + 'px');
      }
      function setAiPaneWidth(layout, px) {
        if (!layout) return;
        var b = aiPaneBounds();
        var clamped = Math.max(b.min, Math.min(b.max, Math.round(px)));
        layout.style.setProperty('--ai-pane-width', clamped + 'px');
      }
      function initPaneResizer(root) {
        var layout = (root || document).querySelector('[data-resizable-layout]');
        var resizer = (root || document).querySelector('[data-pane-resizer]');
        var aiResizer = (root || document).querySelector('[data-ai-pane-resizer]');
        if (!layout || !resizer) return;
        var saved = parseInt(localStorage.getItem(PANE_KEY) || '', 10);
        if (!Number.isNaN(saved)) setPaneWidth(layout, saved);
        var aiSaved = parseInt(localStorage.getItem(AI_PANE_KEY) || '', 10);
        if (!Number.isNaN(aiSaved)) setAiPaneWidth(layout, aiSaved);
        var dragging = false;
        var draggingAi = false;
        var dragStartX = 0;
        var dragStartSide = 430;
        var dragStartAi = 420;
        function commit(px) {
          setPaneWidth(layout, px);
          var current = parseInt(getComputedStyle(layout).getPropertyValue('--side-pane-width'), 10);
          if (!Number.isNaN(current)) localStorage.setItem(PANE_KEY, String(current));
          scheduleChartResize();
        }
        function commitAi(px) {
          setAiPaneWidth(layout, px);
          var current = parseInt(getComputedStyle(layout).getPropertyValue('--ai-pane-width'), 10);
          if (!Number.isNaN(current)) localStorage.setItem(AI_PANE_KEY, String(current));
          scheduleChartResize();
        }
        resizer.addEventListener('mousedown', function (e) {
          dragging = true;
          dragStartX = e.clientX;
          dragStartSide = parseInt(getComputedStyle(layout).getPropertyValue('--side-pane-width'), 10);
          if (Number.isNaN(dragStartSide)) dragStartSide = 430;
          layout.classList.add('resizing');
          e.preventDefault();
        });
        if (aiResizer) {
          aiResizer.addEventListener('mousedown', function (e) {
            draggingAi = true;
            dragStartX = e.clientX;
            dragStartAi = parseInt(getComputedStyle(layout).getPropertyValue('--ai-pane-width'), 10);
            if (Number.isNaN(dragStartAi)) dragStartAi = 420;
            layout.classList.add('resizing');
            e.preventDefault();
          });
        }
        document.addEventListener('mousemove', function (e) {
          if (dragging) {
            commit(dragStartSide + (dragStartX - e.clientX));
            return;
          }
          if (draggingAi) {
            commitAi(dragStartAi + (dragStartX - e.clientX));
          }
        });
        document.addEventListener('mouseup', function () {
          if (!dragging && !draggingAi) return;
          dragging = false;
          draggingAi = false;
          layout.classList.remove('resizing');
          scheduleChartResize();
        });
        resizer.addEventListener('dblclick', function () {
          localStorage.removeItem(PANE_KEY);
          layout.style.removeProperty('--side-pane-width');
          scheduleChartResize();
        });
        resizer.addEventListener('keydown', function (e) {
          if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
          var step = e.shiftKey ? 40 : 16;
          var current = parseInt(getComputedStyle(layout).getPropertyValue('--side-pane-width'), 10);
          if (Number.isNaN(current)) current = 430;
          if (e.key === 'ArrowLeft') current += step;
          if (e.key === 'ArrowRight') current -= step;
          commit(current);
          e.preventDefault();
        });
        if (aiResizer) {
          aiResizer.addEventListener('dblclick', function () {
            localStorage.removeItem(AI_PANE_KEY);
            layout.style.removeProperty('--ai-pane-width');
            scheduleChartResize();
          });
          aiResizer.addEventListener('keydown', function (e) {
            if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
            var step = e.shiftKey ? 40 : 16;
            var current = parseInt(getComputedStyle(layout).getPropertyValue('--ai-pane-width'), 10);
            if (Number.isNaN(current)) current = 420;
            if (e.key === 'ArrowLeft') current += step;
            if (e.key === 'ArrowRight') current -= step;
            commitAi(current);
            e.preventDefault();
          });
        }
        window.addEventListener('resize', function () {
          var current = parseInt(getComputedStyle(layout).getPropertyValue('--side-pane-width'), 10);
          if (!Number.isNaN(current)) setPaneWidth(layout, current);
          var aiCurrent = parseInt(getComputedStyle(layout).getPropertyValue('--ai-pane-width'), 10);
          if (!Number.isNaN(aiCurrent)) setAiPaneWidth(layout, aiCurrent);
          scheduleChartResize();
        });
      }
      initPaneResizer(document);
      initChartResizeObserver(document);
      document.body.addEventListener('htmx:afterSwap', function () {
        initPaneResizer(document);
        initChartResizeObserver(document);
        scheduleChartResize();
      });

      // --- AI Panel ---
      var AI_PANEL_OPEN_KEY = 'taskunity.aiPanelOpen';
      var AI_PANEL_URL_KEY = 'taskunity.aiPanelUrl';
      var AI_PANEL_GENERIC_URL = '/ai/panel';
      var lastAiPanelUrl = sessionStorage.getItem(AI_PANEL_URL_KEY) || '';
      var preservedAiPanelNode = null;
      var preservedAiPanelHidden = true;
      function resolveAiContextUrlFromTaskPanel() {
        var taskPanel = document.getElementById('task-panel');
        if (!taskPanel) return '';
        var scoped = taskPanel.querySelector ? taskPanel.querySelector('[data-ai-context-url]') : null;
        return scoped ? (scoped.getAttribute('data-ai-context-url') || '') : '';
      }
      function syncAiToggleContextUrl(url) {
        var btn = document.querySelector('[data-ai-panel-toggle]');
        if (!btn) return;
        btn.setAttribute('data-ai-context-url', url || '');
      }
      function updateAiPanelToggle() {
        var btn = document.querySelector('[data-ai-panel-toggle]');
        if (!btn) return;
        var main = getMainLayout();
        var isOpen = !!(main && !main.classList.contains('ai-panel-collapsed'));
        btn.textContent = isOpen ? 'Disable AI' : 'Enable AI';
        btn.setAttribute('aria-pressed', isOpen ? 'true' : 'false');
        btn.classList.toggle('is-active', isOpen);
      }
      function clearAiPanelContext() {
        var panel = document.getElementById('ai-panel');
        if (!panel) return;
        var form = panel.querySelector('#ai-chat-form');
        if (form) {
          ['context_type', 'entity_id', 'context_json'].forEach(function (name) {
            var field = form.querySelector('[name="' + name + '"]');
            if (field) field.value = '';
          });
          var historyInput = form.querySelector('#ai-history');
          if (historyInput) historyInput.value = '[]';
          var extraContextInput = form.querySelector('#ai-extra-context-json');
          if (extraContextInput) extraContextInput.value = '[]';
          var textarea = form.querySelector('textarea[name="user_message"]');
          if (textarea) textarea.placeholder = 'Ask AI…';
        }
        var currentKind = panel.querySelector('#ai-current-context-kind');
        var currentId = panel.querySelector('#ai-current-context-id');
        var currentLabel = panel.querySelector('#ai-current-context-label');
        if (currentKind) currentKind.value = '';
        if (currentId) currentId.value = '';
        if (currentLabel) currentLabel.value = '';
        var messages = panel.querySelector('#ai-messages');
        if (messages) {
          messages.innerHTML = '';
          delete messages.dataset.history;
        }
        var addControls = panel.querySelector('#ai-context-add-controls');
        if (addControls) addControls.hidden = true;
        if (window.taskunityAiRenderContextChips && typeof window.taskunityAiRenderContextChips === 'function') {
          window.taskunityAiRenderContextChips();
        }
      }
      function aiSyncPanelContext(nextUrl) {
        var panel = document.getElementById('ai-panel');
        if (!panel || !nextUrl) return;
        if (window.htmx && typeof window.htmx.ajax === 'function') {
          window.htmx.ajax('GET', nextUrl, { target: '#ai-panel', swap: 'innerHTML' });
        }
      }
      function syncAiContextFromCurrentPanel() {
        var nextUrl = resolveAiContextUrlFromTaskPanel();
        syncAiToggleContextUrl(nextUrl);
        if (!nextUrl) {
          lastAiPanelUrl = AI_PANEL_GENERIC_URL;
          sessionStorage.setItem(AI_PANEL_URL_KEY, AI_PANEL_GENERIC_URL);
          var mainNoSelection = getMainLayout();
          if (mainNoSelection && !mainNoSelection.classList.contains('ai-panel-collapsed')) {
            aiSyncPanelContext(AI_PANEL_GENERIC_URL);
          }
          return;
        }
        lastAiPanelUrl = nextUrl;
        sessionStorage.setItem(AI_PANEL_URL_KEY, nextUrl);
        var main = getMainLayout();
        if (!main || main.classList.contains('ai-panel-collapsed')) return;
        aiSyncPanelContext(nextUrl);
      }
      function openAiPanel() {
        var main = getMainLayout();
        var panel = document.getElementById('ai-panel');
        if (main) main.classList.remove('ai-panel-collapsed');
        sessionStorage.setItem(AI_PANEL_OPEN_KEY, '1');
        if (panel) panel.hidden = false;
        if (!lastAiPanelUrl) {
          lastAiPanelUrl = AI_PANEL_GENERIC_URL;
          sessionStorage.setItem(AI_PANEL_URL_KEY, AI_PANEL_GENERIC_URL);
        }
        if (panel && lastAiPanelUrl && window.htmx && typeof window.htmx.ajax === 'function') {
          window.htmx.ajax('GET', lastAiPanelUrl, { target: '#ai-panel', swap: 'innerHTML' });
        }
        updateAiPanelToggle();
      }
      function closeAiPanel() {
        var main = getMainLayout();
        var panel = document.getElementById('ai-panel');
        if (main) main.classList.add('ai-panel-collapsed');
        sessionStorage.setItem(AI_PANEL_OPEN_KEY, '0');
        if (panel) panel.hidden = true;
        updateAiPanelToggle();
      }
      document.addEventListener('click', function (e) {
        var toggleBtn = e.target.closest('[data-ai-panel-toggle]');
        if (toggleBtn) {
          var btnUrl = toggleBtn.getAttribute('data-ai-context-url') || '';
          if (btnUrl) {
            lastAiPanelUrl = btnUrl;
            sessionStorage.setItem(AI_PANEL_URL_KEY, btnUrl);
          } else {
            lastAiPanelUrl = AI_PANEL_GENERIC_URL;
            sessionStorage.setItem(AI_PANEL_URL_KEY, AI_PANEL_GENERIC_URL);
          }
          var main = getMainLayout();
          var isOpen = !!(main && !main.classList.contains('ai-panel-collapsed'));
          if (isOpen) closeAiPanel();
          else openAiPanel();
          return;
        }
        // Open AI panel via HTMX-injected content, triggered by data-open-ai-panel buttons
        var openBtn = e.target.closest('[data-open-ai-panel]');
        if (openBtn) {
          var openUrl = openBtn.getAttribute ? (openBtn.getAttribute('hx-get') || '') : '';
          if (openUrl) {
            lastAiPanelUrl = openUrl;
            sessionStorage.setItem(AI_PANEL_URL_KEY, openUrl);
          }
          openAiPanel();
          return;
        }
        // Close AI panel
        var closeBtn = e.target.closest('[data-ai-panel-close]');
        if (closeBtn) {
          closeAiPanel();
          return;
        }
      });
      document.body.addEventListener('htmx:beforeRequest', function (e) {
        var trigger = e && e.detail ? e.detail.elt : null;
        if (!trigger) return;
        var source = trigger.closest ? trigger.closest('[hx-target="#ai-panel"]') : null;
        var target = (source && source.getAttribute ? source.getAttribute('hx-target') : null) || (trigger.getAttribute && trigger.getAttribute('hx-target'));
        if (target !== '#ai-panel' && !source) return;
        var panelUrl = ((source && source.getAttribute && source.getAttribute('hx-get')) || (trigger.getAttribute && trigger.getAttribute('hx-get')) || '');
        if (panelUrl) {
          lastAiPanelUrl = panelUrl;
          sessionStorage.setItem(AI_PANEL_URL_KEY, panelUrl);
        }
        openAiPanel();
      });
      document.body.addEventListener('htmx:beforeSwap', function (e) {
        var target = e && e.detail ? e.detail.target : null;
        if (!target || target.id !== 'app-main') return;
        var panel = document.getElementById('ai-panel');
        if (!panel || !panelHasContent(panel)) {
          preservedAiPanelNode = null;
          return;
        }
        preservedAiPanelNode = panel;
        preservedAiPanelHidden = panel.hidden;
        panel.remove();
      });
      document.body.addEventListener('htmx:afterSwap', function (e) {
        var target = e && e.detail ? e.detail.target : null;
        if (!target) return;
        var panel = target.id === 'ai-panel' ? target : (target.closest ? target.closest('#ai-panel') : null);
        if (!panel) return;
        openAiPanel();
        updateAiPanelToggle();
      });
      document.body.addEventListener('htmx:afterSwap', function (e) {
        var target = e && e.detail ? e.detail.target : null;
        if (!target || target.id !== 'task-panel') return;
        syncAiContextFromCurrentPanel();
      });
      document.body.addEventListener('htmx:afterSwap', function (e) {
        var target = e && e.detail ? e.detail.target : null;
        if (!target || target.id !== 'app-main') return;
        var freshPanel = document.getElementById('ai-panel');
        if (freshPanel && preservedAiPanelNode) {
          freshPanel.replaceWith(preservedAiPanelNode);
          preservedAiPanelNode.hidden = preservedAiPanelHidden;
          preservedAiPanelNode = null;
        }
        syncAiContextFromCurrentPanel();
        if (sessionStorage.getItem(AI_PANEL_OPEN_KEY) !== '1') return;
        openAiPanel();
        updateAiPanelToggle();
      });
      document.body.addEventListener('taskunity:ai-apply', function (e) {
        var detail = e && e.detail ? e.detail : {};
        var refreshUrl = detail.refreshContextUrl || '';
        var refreshTaskPanelUrl = detail.refreshTaskPanelUrl || '';
        if (refreshUrl) {
          lastAiPanelUrl = refreshUrl;
          sessionStorage.setItem(AI_PANEL_URL_KEY, refreshUrl);
        }
        if (window.htmx && typeof window.htmx.ajax === 'function') {
          var panelUrl = refreshTaskPanelUrl || lastTaskPanelUrl;
          if (panelUrl) window.htmx.ajax('GET', panelUrl, { target: '#task-panel', swap: 'innerHTML' });
          if (refreshUrl) aiSyncPanelContext(refreshUrl);
        }
      });
      // Quick action prompts in the AI panel
      document.addEventListener('click', function (e) {
        var qBtn = e.target.closest('[data-ai-prompt]');
        if (!qBtn) return;
        var prompt = qBtn.dataset.aiPrompt;
        var form = document.getElementById('ai-chat-form');
        if (!form) return;
        var ta = form.querySelector('textarea[name="user_message"]');
        if (ta) {
          ta.value = prompt;
          ta.focus();
        }
      });
      document.addEventListener('submit', function (e) {
        var form = e.target && e.target.closest ? e.target.closest('#ai-chat-form') : null;
        if (!form) return;
        var ta = form.querySelector('textarea[name="user_message"]');
        var msgs = document.getElementById('ai-messages');
        var text = ta ? (ta.value || '').trim() : '';
        if (!text || !msgs) return;

        var userMsg = document.createElement('div');
        userMsg.className = 'ai-msg ai-msg-user';
        var content = document.createElement('div');
        content.className = 'ai-msg-content';
        content.textContent = text;
        userMsg.appendChild(content);
        msgs.appendChild(userMsg);
        msgs.scrollTop = msgs.scrollHeight;
        if (ta) ta.value = '';
      });
      document.body.addEventListener('htmx:afterRequest', function (e) {
        var form = e && e.detail ? e.detail.elt : null;
        if (!form || !form.matches || !form.matches('#ai-chat-form')) return;
        var msgs = document.getElementById('ai-messages');
        var histInput = document.getElementById('ai-history');
        if (!msgs || !histInput) return;
        histInput.value = msgs.dataset.history || histInput.value || '[]';
      });
      // Load model list into the datalist when user clicks the ↻ button
      document.addEventListener('click', function (e) {
        var loadBtn = e.target.closest('#ai-load-models-btn');
        if (!loadBtn) return;
        var modelInput = document.getElementById('ai-model-input');
        // HTMX handles the actual request, wire the list attribute after swap
        loadBtn.addEventListener('htmx:afterSwap', function () {
          if (modelInput) modelInput.setAttribute('list', 'ai-model-datalist');
        }, { once: true });
      });

      syncAiContextFromCurrentPanel();
      updateAiPanelToggle();
    })();
  </script>
</body>
</html>
